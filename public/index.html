<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAPNATRADER | Terminal Deck</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#060810',
                        surface: '#0D111C',
                        accent: '#34D399', // emerald-400
                        border: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060810; -webkit-tap-highlight-color: transparent; }
        .terminal-border { border: 1px solid #1E293B; }
        .glass { background: rgba(13, 17, 28, 0.8); backdrop-filter: blur(8px); }
        .card-anim { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-anim:active { scale: 0.98; opacity: 0.9; }
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .pulse-emerald { animation: pulse-emerald 2s infinite; }
        .tracking-ultra { tracking-widest: 0.25em; }
    </style>
</head>
<body class="text-slate-300 font-mono selection:bg-accent/30 selection:text-accent">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-12 bg-background border-b border-border z-50 px-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-black tracking-[0.4em] uppercase text-white">AAPNATRADER</span>
        </div>
        <div class="flex items-center gap-1.5 bg-accent/5 px-2 py-0.5 rounded border border-accent/10">
            <div class="w-1.5 h-1.5 rounded-full bg-accent pulse-emerald"></div>
            <span class="text-[8px] font-bold text-accent uppercase tracking-tighter">Live Connect</span>
        </div>
    </header>

    <main class="pt-16 pb-40 px-3 max-w-lg mx-auto">
        <!-- Hero Section -->
        <div class="mb-6">
            <h1 class="text-2xl font-black tracking-tight text-white leading-none mb-1 uppercase italic">AAPNATRADER</h1>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em]">Momentum Logic Deck</p>
        </div>

        <!-- Metric Grid -->
        <div class="grid grid-cols-2 gap-px bg-border terminal-border rounded overflow-hidden mb-6">
            <div class="bg-background p-3">
                <div class="text-slate-500 text-[8px] font-bold uppercase tracking-widest mb-1">Matrix Engine</div>
                <div class="text-[11px] font-bold text-white uppercase">Nifty 500</div>
            </div>
            <div class="bg-background p-3">
                <div class="text-slate-500 text-[8px] font-bold uppercase tracking-widest mb-1">System Status</div>
                <div id="scan-status" class="text-[11px] font-bold text-slate-500 uppercase">Idle</div>
            </div>
        </div>

        <!-- Signals Content Area -->
        <div id="signals-container" class="space-y-2">
            <!-- Low-Profile Idle State -->
            <div id="empty-state" class="py-12 flex flex-col items-center justify-center gap-3">
                <div class="w-1.5 h-1.5 bg-accent rounded-full pulse-emerald"></div>
                <div class="text-[9px] font-bold text-slate-600 tracking-[0.2em] uppercase">
                    [ System Status // Ready for Dispatch ]
                </div>
            </div>
        </div>
    </main>

    <!-- Command Station (Sticky Bottom Panel) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 glass border-t border-border z-50">
        <div class="max-w-lg mx-auto space-y-2">
            <!-- Results Stats (Hidden initially) -->
            <div id="results-meta" class="hidden flex justify-between items-center px-1 mb-2">
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Active Signals Detected</span>
                <button id="export-btn" class="border border-border bg-surface/50 hover:bg-surface text-slate-400 font-bold text-[9px] tracking-widest uppercase rounded px-2.5 py-1.5 transition-all">
                    Download Data Sheet (.CSV)
                </button>
            </div>

            <!-- Primary Actions -->
            <button id="scan-btn" class="w-full bg-accent text-background py-4 rounded font-black text-xs uppercase tracking-[0.2em] active:scale-95 transition-all flex items-center justify-center gap-2">
                <span id="btn-text">Execute Scan</span>
                <svg id="loading-spinner" class="hidden animate-spin h-3 w-3 text-background" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('scan-btn');
        const exportBtn = document.getElementById('export-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const signalsContainer = document.getElementById('signals-container');
        const scanStatus = document.getElementById('scan-status');
        const emptyState = document.getElementById('empty-state');
        const resultsMeta = document.getElementById('results-meta');

        let lastScanData = [];

        async function triggerScan() {
            scanBtn.disabled = true;
            resultsMeta.classList.add('hidden');
            btnText.textContent = 'Analyzing Nifty 500...';
            loadingSpinner.classList.remove('hidden');
            
            scanStatus.textContent = 'Active';
            scanStatus.classList.replace('text-slate-500', 'text-accent');
            scanStatus.classList.add('animate-pulse');

            try {
                const response = await fetch('/api/scan');
                const result = await response.json();

                if (result.status === 'success') {
                    lastScanData = result.data;
                    renderSignals(result.data);
                    scanStatus.textContent = 'Done';
                    if (result.data.length > 0) {
                        resultsMeta.classList.remove('hidden');
                    }
                } else {
                    throw new Error('Scan failed');
                }
            } catch (error) {
                console.error('Scan Error:', error);
                scanStatus.textContent = 'Error';
                scanStatus.classList.replace('text-accent', 'text-red-500');
            } finally {
                scanBtn.disabled = false;
                btnText.textContent = 'Re-Execute System Scan';
                loadingSpinner.classList.add('hidden');
                scanStatus.classList.remove('animate-pulse');
            }
        }

        function renderSignals(stocks) {
            if (stocks.length === 0) {
                emptyState.classList.remove('hidden');
                signalsContainer.innerHTML = '';
                signalsContainer.appendChild(emptyState);
                return;
            }

            emptyState.classList.add('hidden');
            signalsContainer.innerHTML = '';

            stocks.forEach((stock, index) => {
                const card = document.createElement('div');
                card.className = 'bg-surface border border-border p-4 rounded card-anim relative overflow-hidden group';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-lg tracking-tight text-white leading-none uppercase">${stock.ticker}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Entry: ₹${stock.price.toLocaleString('en-IN')}</span>
                            </div>
                        </div>
                        <div class="bg-emerald-950 px-2 py-0.5 rounded border border-accent/20">
                            <span class="text-[9px] font-black text-accent uppercase">Setup: ${stock.score}</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center text-[8px] font-bold uppercase tracking-widest text-slate-500">
                        <div class="flex gap-3">
                            <span>9 EMA: <span class="text-slate-300">${stock.ema9}</span></span>
                            <span>20 EMA: <span class="text-slate-300">${stock.ema20}</span></span>
                        </div>
                        <span class="text-accent">Bullish Pulse</span>
                    </div>
                `;
                signalsContainer.appendChild(card);
            });
        }

        function exportToCSV() {
            if (lastScanData.length === 0) return;

            const headers = ['Ticker', 'Price (INR)', '9 EMA', '20 EMA', 'Momentum Condition', 'Tightness Score'];
            const rows = lastScanData.map(stock => [
                stock.ticker,
                stock.price,
                stock.ema9,
                stock.ema20,
                stock.setup,
                stock.score
            ]);

            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            
            const date = new Date().toISOString().split('T')[0];
            link.setAttribute("download", `AAPNATRADER_Scan_${date}.csv`);
            document.body.appendChild(link);

            link.click();
            document.body.removeChild(link);
        }

        scanBtn.addEventListener('click', triggerScan);
        exportBtn.addEventListener('click', exportToCSV);
    </script>
</body>
</html>
