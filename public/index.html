                        surface: 'var(--surface-color)',
                        accent: 'var(--accent-color)',
                        border: 'var(--border-color)',

                    fontFamily: {

                    }

    <style>
        :root {
            --bg-color: #030712;
            --surface-color: #111827;
            --accent-color: #34D399;
            --border-color: #1E293B;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --glass-bg: #111827;
            --pod-bg: #111827;
        }

        body.light-theme {
            --bg-color: #f4f6f9;
            --surface-color: #ffffff;
            --accent-color: #059669;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #475569; 
            --glass-bg: rgba(255, 255, 255, 0.8);
            --pod-bg: #ffffff;
        }

        body.dark {
            --bg-color: #030712;
            --surface-color: #0b0f19;
        }

        /* Targeted Hardware-Accelerated Theme Transition */
        .theme-transition {
            transition: background-color 300ms ease, border-color 300ms ease, box-shadow 300ms ease !important;
            will-change: background-color, border-color;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-secondary);
            -webkit-tap-highlight-color: transparent; 
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.dark .card-anim {
            background-color: rgba(11, 15, 25, 0.9) !important;
            border-color: rgba(30, 41, 59, 0.9) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2) !important;
        }
        body.dark .card-anim:hover {
            border-color: rgba(51, 65, 85, 0.8) !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35) !important;
            transform: translateY(-2px);
        }

        /* Optimized Dual-Layer Background Texture */
        body::before, body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            transition: opacity 500ms cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* Dark Grid */
        body::before {
            background-image: linear-gradient(rgba(16, 185, 129, 0.12) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(16, 185, 129, 0.12) 1px, transparent 1px);
            background-size: 16px 16px;
            opacity: 1;
        }

        /* Light Texture */
        body::after {
            background-image: radial-gradient(rgba(15, 23, 42, 0.12) 1px, transparent 1px);
            background-size: 12px 12px;
            opacity: 0;
        }

        body.light-theme::before { opacity: 0; }
        body.light-theme::after { opacity: 1; }

        /* --- Content Isolation Layer --- */
        body > * {
            position: relative;
            z-index: 1;
        }

        /* --- Light Theme Force Overrides --- */
        body.light-theme .text-slate-100,
        body.light-theme .text-slate-300,
        body.light-theme .text-slate-500,
        body.light-theme .text-white,
        body.light-theme .brand-text span:first-child { color: #0f172a !important; }
        
        body.light-theme .card-anim h3,
        body.light-theme .card-anim span:not(.text-accent):not(.signal-up):not(.signal-down) { color: #0f172a !important; }

        body.light-theme .tactical-card { 
            background: #ffffff !important; 
            border: 1px solid rgba(16, 185, 129, 0.1) !important; 
            backdrop-filter: blur(16px) !important; 
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.05) !important;
        }

        body.light-theme .card-anim {
            background-color: #ffffff !important;
            border: 1px solid rgba(226, 232, 240, 0.6) !important;
            border-left: 4px solid #059669 !important;
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.05) !important;
        }

        body.light-theme #scan-btn,
        body.light-theme #export-btn {
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.3) !important;
        }

        body.light-theme .score-badge {
            background: rgba(5, 150, 105, 0.08) !important;
            border: 1px solid rgba(5, 150, 105, 0.2) !important;
            color: #059669 !important;
        }

        body.light-theme select {
            color: #1e293b !important;
            border-color: #e2e8f0 !important; 
            background-color: #ffffff !important;
        }
        
        body.light-theme select option { color: #1e293b !important; }
        
        body.light-theme #matrix-engine-display { color: #1e293b !important; }
        body.light-theme #scan-status:not(.signal-up):not(.signal-down) { color: #64748b !important; }

        body.light-theme #strategy-scanner, 
        body.light-theme #strategy-momentum-open {
            background-color: #ffffff !important;
            border-color: #e2e8f0 !important;
        }

        /* High-Contrast Signal Overrides (Theme Agnostic) */
        .signal-up { color: #34D399 !important; font-weight: 800 !important; }
        .signal-down { color: #f87171 !important; font-weight: 800 !important; }
        
        body.light-theme .signal-up { color: #059669 !important; }
        body.light-theme .signal-down { color: #dc2626 !important; }
        /* ---------------------------------- */

        /* Solid UI Overrides */
        #strategy-scanner, #strategy-momentum-open {
            background-color: var(--surface-color);
        }
        #strategy-scanner.border-accent {
            background-color: #152721; /* Solid Dark Emerald Tint */
        }
        body.light-theme #strategy-scanner.border-accent {
            background-color: #ecfdf5 !important; /* Solid Light Emerald Tint */
        }

        #universe-selector {
            background-color: var(--bg-color) !important;
        }

        /* --- Section Header Masking --- */
        .section-header-mask {
            background: #030712;
            box-shadow: 0 0 10px 10px #030712;
            border-radius: 4px;
            padding: 6px 12px;
            z-index: 10;
            position: relative;
            margin-left: -12px; /* Offset padding for alignment */
        }
        body.light-theme .section-header-mask {
            background: #f8fafc !important;
            box-shadow: 0 0 10px 10px #f8fafc !important;
        }
        .section-header-mask h2, .section-header-mask div {
            font-weight: 700 !important;
            text-rendering: optimizeLegibility;
        }
        /* ------------------------------ */

        .text-slate-300 { color: var(--text-primary); }
        .text-slate-100 { color: var(--text-primary); }
        .text-slate-500 { color: var(--text-secondary); }
        .text-white { color: var(--text-primary); }
        .bg-background { background-color: var(--bg-color); }
        .bg-surface { background-color: var(--surface-color); }
        .border-border { border-color: var(--border-color); }
        
        .terminal-border { border: 1px solid var(--border-color); }
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); }
        .tactical-card { background: var(--pod-bg); backdrop-filter: blur(12px); }

        /* --- Global Interaction Transition --- */
        button, .card-anim, select, .switch .slider {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        /* --- Main Action Buttons (Scan/Export) --- */
        #scan-btn, #export-btn {
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        #scan-btn:hover, #export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.25);
            letter-spacing: 4px;
        }
        body.light-theme #scan-btn:hover {
            background-color: #059669 !important; /* emerald-600 */
        }
        #scan-btn:active, #export-btn:active {
            transform: translateY(0px) scale(0.98);
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
        }

        /* --- Strategy Tabs --- */
        #strategy-scanner, #strategy-momentum-open {
            border: 1px solid var(--border-color);
        }
        #strategy-scanner:hover, #strategy-momentum-open:hover {
            border-color: var(--accent-color);
            background-color: rgba(52, 211, 153, 0.05);
        }
        body.light-theme #strategy-scanner:hover, 
        body.light-theme #strategy-momentum-open:hover {
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
            border-color: rgba(226, 232, 240, 0.8); /* slate-200/80 */
        }

        /* --- Live Signals Cards --- */
        .card-anim { 
            background-color: var(--surface-color) !important;
            cursor: pointer; 
            border: 1px solid var(--border-color);
        }
        .card-anim:hover { 
            transform: translateY(-2px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease !important;
        }
        body.light-theme .card-anim:hover {
            border-color: rgba(203, 213, 225, 0.9) !important; /* slate-300/90 */
        }
        .card-anim:active { 
            transform: translateY(-1px) scale(0.99);
            opacity: 0.9; 
        }

        /* --- Dropdowns & Selection Inputs --- */
        select {
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        select:hover, select:focus {
            border-color: var(--accent-color) !important;
            outline: none;
            box-shadow: 0 0 0 1px var(--accent-color);
        }
        
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .pulse-emerald { animation: pulse-emerald 2s infinite; }

        @keyframes neon-breathe {
            from { text-shadow: 0 0 10px rgba(52, 211, 153, 0.4), 0 0 20px rgba(52, 211, 153, 0.2); }
            to { text-shadow: 0 0 25px rgba(52, 211, 153, 0.9), 0 0 45px rgba(52, 211, 153, 0.5); }
        }
        .brand-glow { animation: neon-breathe 3s ease-in-out infinite alternate; }

        @keyframes border-pulse {
            0%, 100% { border-color: rgba(52, 211, 153, 0.1); box-shadow: 0 0 15px rgba(52, 211, 153, 0.05); }
            50% { border-color: rgba(52, 211, 153, 0.3); box-shadow: 0 0 30px rgba(52, 211, 153, 0.1); }
        }
        .tactical-card { border-width: 0.5px; animation: border-pulse 5s infinite ease-in-out; }
        
        .brand-text {
            font-family: "Iceland", sans-serif;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: inline-block;
        }

        .theme-toggle {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Custom Theme Switch - High-Tech Refactor */
        .switch {
            position: relative;
            display: flex;
            align-items: center;
            width: 48px;
            height: 24px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #0b0f19;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 2px;
            background-color: #10b981;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        input:checked + .slider {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.08);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: #059669;
            box-shadow: 0 0 10px rgba(5, 150, 105, 0.6);
        }

        /* --- Mobile Responsive Logic (< 768px) --- */
        @media (max-width: 767px) {
            header .max-w-6xl {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
                padding: 12px 16px;
                height: auto;
            }
            
            header {
                height: auto;
                min-height: 4rem;
            }

            .brand-text {
                font-size: 1.25rem;
            }

            .flex.items-center.gap-\[16px\] {
                gap: 8px;
            }

            .switch {
                width: 40px;
                height: 20px;
            }
            .slider:before {
                height: 14px;
                width: 14px;
                left: 3px;
                bottom: 2px;
            }
            input:checked + .slider:before {
                transform: translateX(20px);
            }

            .max-w-6xl.mx-auto.px-4.pt-16 {
                pt-24;
            }

            /* Hero Scaling */
            .mb-12.p-8.rounded-3xl {
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }
            
            h1.brand-text {
                font-size: 1.8rem !important;
                letter-spacing: 2px !important;
            }

            /* Action Tabs Flex */
            .mb-6.grid.grid-cols-2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            
            #strategy-scanner, #strategy-momentum-open {
                padding-top: 1rem;
                padding-bottom: 1rem;
                font-size: 8px;
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>
<body class="font-mono selection:bg-accent/30 selection:text-accent theme-transition">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-background border-b border-border z-50 flex items-center theme-transition">

                    <span class="relative flex h-2 w-2">
                        <span class="absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75 animate-ping"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>

                </div>
            </div>
        </div>
    </header>

    <!-- Main structural layout container -->
    <div class="max-w-6xl mx-auto px-4 pt-16 pb-32 md:py-24">
        
        <!-- Hero Section (Tactical Pod) -->
        <div class="mb-12 p-8 rounded-3xl border border-[#10b98122] bg-slate-950/60 backdrop-blur-xl max-w-[500px] mx-auto text-center relative overflow-hidden shadow-2xl tactical-card">
            <div class="relative z-10 flex flex-col items-center">
                <div class="h-20 w-20 mb-6 text-slate-100 drop-shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
                        <path d="M50 20L20 80H32L50 44L68 80H80L50 20Z" fill="currentColor"/>
                        <path d="M42 60H58L65 75H35L42 60Z" fill="#10B981"/>
                        <path d="M75 25L85 15M85 15H77M85 15V23" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1 class="text-[2.5rem] mb-4 brand-text leading-none">
                    <span class="text-slate-100 drop-shadow-[0_0_10px_rgba(255,255,255,0.05)]">AAPNA</span><span class="text-emerald-400 brand-glow">TRADER</span>
                </h1>
                <p class="text-[10px] font-bold text-accent/60 uppercase tracking-[4px]">
                    MOMENTUM LOGIC DECK
                </p>
            </div>
            <!-- Ambient Background Glow -->
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-accent/5 blur-[50px] rounded-full"></div>
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-accent/5 blur-[50px] rounded-full"></div>
        </div>

        <!-- Strategy Switcher -->
        <div class="mb-6 grid grid-cols-2 gap-4 theme-transition">
            <button id="strategy-scanner" class="bg-emerald-50/40 text-emerald-700 border-2 border-emerald-500 font-bold shadow-[0_2px_10px_rgba(5,150,105,0.06)] py-4 rounded text-[10px] tracking-[0.2em] transition-all duration-300 ease-out active:scale-[0.99] hover:transform-none uppercase dark:bg-emerald-950/40 dark:text-emerald-400 dark:border-emerald-500/80 dark:shadow-[0_0_15px_rgba(16,185,129,0.15)]">

                MOMENTUM OPEN 2.0

        </div>

        <!-- Universe Selector -->
        <div class="mb-10 space-y-2">
            <label class="text-[8px] font-bold text-slate-500 uppercase tracking-widest block ml-1">Select Market Universe</label>

                <option value="chunk5">Chunk 5: Nano-caps Momentum (₹100 Cr - ₹500 Cr)</option>
            </select>
        </div>

        <!-- Responsive Flex/Grid Split -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            
            <!-- Column A (Control Section - Left Side on Desktop) -->
            <div class="md:col-span-5 space-y-6 theme-transition">
                
                <!-- Metric Grid -->
                <div class="grid grid-cols-2 gap-px bg-border terminal-border rounded overflow-hidden">
                    <div class="bg-background p-4">
                        <div class="text-slate-500 text-[8px] font-bold uppercase tracking-widest mb-1">Matrix Engine</div>

                    <div class="bg-background p-4">

                    <button id="scan-btn" class="w-full bg-accent text-background py-5 rounded font-black text-xs uppercase tracking-[0.2em] active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span id="btn-text">Execute Scan</span>
                        <svg id="loading-spinner" class="hidden animate-spin h-4 w-4 text-background" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>

                    <div id="results-meta" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
                        <button id="export-btn" class="w-full border border-border bg-surface/50 hover:bg-surface text-slate-400 font-bold text-[10px] tracking-widest uppercase rounded py-4 transition-all flex items-center justify-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download Data Sheet (.CSV)
                        </button>
                    </div>
                </div>

            </div>

            <!-- Column B (Results Deck - Right Side on Desktop) -->
            <div class="md:col-span-7">
                
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-border/50 section-header-mask">
                    <h2 class="text-xs font-bold uppercase tracking-[0.3em] text-slate-500">Live Signals</h2>
                    <div id="result-count-badge" class="hidden text-[10px] font-bold text-accent uppercase tracking-widest">
                        Signals: <span id="signal-count">0</span>
                    </div>
                </div>

                <!-- Client-side Ticker Search -->
                <div class="mb-4 relative group">
                    <div class="absolute -inset-0.5 bg-accent/20 rounded blur opacity-0 group-focus-within:opacity-100 transition duration-300"></div>
                    <input type="text" id="ticker-search" placeholder="[ TICKER_SEARCH ]" 
                        class="relative w-full bg-background border border-border text-slate-300 py-3 px-4 rounded text-[10px] font-bold tracking-widest uppercase focus:outline-none focus:border-accent transition-all placeholder:text-slate-600">
                </div>

                <div id="signals-container" class="space-y-3 min-h-[300px]">
                    <!-- Low-Profile Idle State -->
                    <div id="empty-state" class="py-20 flex flex-col items-center justify-center gap-4 terminal-border border-dashed rounded-[2rem]">
                        <div class="w-2 h-2 bg-accent rounded-full pulse-emerald"></div>
                        <div class="text-[10px] font-bold text-slate-600 tracking-[0.2em] uppercase text-center px-4 leading-relaxed">
                            [ System Status // Ready for Dispatch ]<br/>
                            <span class="text-[8px] mt-2 opacity-50 block">Awaiting Data Stream from Matrix Engine</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('scan-btn');
        const exportBtn = document.getElementById('export-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const signalsContainer = document.getElementById('signals-container');
        const scanStatus = document.getElementById('scan-status');
        const emptyState = document.getElementById('empty-state');
        const resultsMeta = document.getElementById('results-meta');
        const signalCountSpan = document.getElementById('signal-count');
        const resultCountBadge = document.getElementById('result-count-badge');
        
        // Theme Toggle Refs
        const themeToggle = document.getElementById('theme-toggle');
        
        // Strategy Switcher & Universe Refs
        const strategyScannerBtn = document.getElementById('strategy-scanner');
        const strategyMomentumOpenBtn = document.getElementById('strategy-momentum-open');
        const universeSelector = document.getElementById('universe-selector');
        const matrixEngineDisplay = document.getElementById('matrix-engine-display');
        const tickerSearch = document.getElementById('ticker-search');

        let lastScanData = [];
        let activeStrategy = 'current';

        // --- Volume Formatter Utility ---
        function formatVolume(vol) {
            if (vol === 0 || vol === '0') return '<1K';
            if (!vol) return 'N/A';
            if (vol >= 10000000) return (vol / 10000000).toFixed(2) + 'Cr';
            if (vol >= 100000) return (vol / 100000).toFixed(2) + 'L';
            if (vol >= 1000) return (vol / 1000).toFixed(1) + 'K';
            return vol.toString();
        }

        // --- Client-side Search Filter ---
        tickerSearch.addEventListener('input', (e) => {
            const query = e.target.value.toUpperCase();
            const cards = signalsContainer.querySelectorAll('.card-anim');
            
            cards.forEach(card => {
                const ticker = card.querySelector('h3').textContent.toUpperCase();
                if (ticker.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // --- Theme Logic ---
        function updateFavicon(isLight) {
            const favicon = document.querySelector('link[rel="icon"]');
            if (!favicon) return;
            // Use hex colors for SVG, escaping the # as %23
            const color = isLight ? '%230f172a' : 'white';
            const svg = `<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M50 20L20 80H32L50 44L68 80H80L50 20Z" fill="${color}"/>
  <path d="M42 60H58L65 75H35L42 60Z" fill="%2310B981"/>
  <path d="M75 25L85 15M85 15H77M85 15V23" stroke="%2310B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;
            favicon.href = `data:image/svg+xml;base64,${btoa(svg)}`;
        }

        function setTheme(isLight, animate = true) {
            // Transitions are handled by the static .theme-transition class on layout containers
            if (isLight) {
                document.body.classList.add('light-theme');
                document.documentElement.classList.remove('dark');
                themeToggle.checked = true;
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-theme');
                document.documentElement.classList.add('dark');
                themeToggle.checked = false;
                localStorage.setItem('theme', 'dark');
            }
            updateFavicon(isLight);
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            setTheme(true, false);
        } else {
            setTheme(false, false);
        }

        themeToggle.addEventListener('change', () => {
            setTheme(themeToggle.checked, true);
        });
        // ------------------

        async function triggerScan() {
            // UI Visual Update for Matrix Engine
            matrixEngineDisplay.textContent = universeSelector.options[universeSelector.selectedIndex].text.split('(')[0].trim();

            scanBtn.disabled = true;
            resultsMeta.classList.add('hidden');
            resultCountBadge.classList.add('hidden');
            let strategyLabel = activeStrategy.toUpperCase();
            if (activeStrategy === 'momentum_open_30') {
                strategyLabel = 'MOMENTUM OPEN 2.0';
            }
            btnText.textContent = `Analyzing ${strategyLabel} Universe...`;
            loadingSpinner.classList.remove('hidden');
            
            scanStatus.textContent = 'Active';
            scanStatus.classList.remove('text-slate-500', 'signal-down');
            scanStatus.classList.add('signal-up', 'animate-pulse');

            try {
                const universe = universeSelector.value;
                const response = await fetch(`/api/scan?strategy=${activeStrategy}&universe=${universe}`);
                const result = await response.json();

                if (result.status === 'success') {
                    lastScanData = result.data;
                    renderSignals(result.data);
                    scanStatus.textContent = 'Done';
                    if (result.data.length > 0) {
                        resultsMeta.classList.remove('hidden');
                        signalCountSpan.textContent = result.data.length;
                        resultCountBadge.classList.remove('hidden');
                    }
                } else {
                    throw new Error('Scan failed');
                }
            } catch (error) {
                console.error('Scan Error:', error);
                scanStatus.textContent = 'Error';
                scanStatus.classList.replace('signal-up', 'signal-down');
            } finally {
                scanBtn.disabled = false;
                btnText.textContent = 'Re-Execute System Scan';
                loadingSpinner.classList.add('hidden');
                scanStatus.classList.remove('animate-pulse');
            }
        }

        function updateStrategy(strategy) {
            activeStrategy = strategy;
            
            const inactiveClass = 'bg-white hover:bg-gradient-to-tr hover:from-white hover:to-emerald-50/30 text-slate-600 hover:text-emerald-600 border border-slate-200/80 hover:border-emerald-300/80 shadow-sm hover:shadow-[0_8px_20px_-4px_rgba(5,150,105,0.12)] hover:-translate-y-[2px] active:scale-[0.98] transition-all duration-300 ease-[cubic-bezier(0.25,0.8,0.25,1)] py-4 rounded text-[10px] tracking-[0.2em] uppercase dark:bg-[#0d131f]/60 dark:text-slate-400 dark:border-slate-800/80 dark:hover:bg-[#111827] dark:hover:text-emerald-400 dark:hover:border-emerald-500/30 dark:hover:shadow-[0_4px_20px_rgba(16,185,129,0.08)] dark:hover:-translate-y-[2px]';
            const activeClass = 'bg-emerald-50/40 text-emerald-700 border-2 border-emerald-500 font-bold shadow-[0_2px_10px_rgba(5,150,105,0.06)] py-4 rounded text-[10px] tracking-[0.2em] transition-all duration-300 ease-out active:scale-[0.99] hover:transform-none uppercase dark:bg-emerald-950/40 dark:text-emerald-400 dark:border-emerald-500/80 dark:shadow-[0_0_15px_rgba(16,185,129,0.15)] font-bold';

            [strategyScannerBtn, strategyMomentumOpenBtn].forEach(btn => {
                btn.className = inactiveClass;
            });

            let activeBtn;
            if (strategy === 'current') {
                activeBtn = strategyScannerBtn;
            } else if (strategy === 'momentum_open_30') {
                activeBtn = strategyMomentumOpenBtn;
            }
            activeBtn.className = activeClass;

            triggerScan();
        }

        function renderSignals(stocks) {
            if (stocks.length === 0) {
                emptyState.classList.remove('hidden');
                signalsContainer.innerHTML = '';
                signalsContainer.appendChild(emptyState);
                return;
            }

            emptyState.classList.add('hidden');
            signalsContainer.innerHTML = '';

            stocks.forEach((stock, index) => {
                const rawVolume = stock.Volume || stock.volume || stock.VOL || stock.vol || 0;
                
                let label1 = '9 EMA:';
                let val1 = stock.price > 0 ? stock.ema9 : 'N/A';
                let label2 = '20 EMA:';
                let val2 = stock.price > 0 ? stock.ema20 : 'N/A';

                const card = document.createElement('div');
                card.className = 'p-5 rounded-xl border border-slate-200/60 dark:border-slate-800/80 bg-white/80 dark:bg-[#0b0f19]/90 shadow-md hover:border-emerald-500/80 hover:shadow-[0_8px_30px_rgba(5,150,105,0.06)] dark:hover:border-emerald-500/60 dark:hover:shadow-[0_0_25px_rgba(16,185,129,0.12)] hover:-translate-y-[1px] transition-all duration-300 card-anim relative overflow-hidden group';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-bold tracking-wide text-slate-800 dark:text-slate-100 uppercase">${stock.ticker}</h3>
                            <div class="flex items-center gap-2 mt-1 dark:bg-slate-900/60 dark:border-slate-800 rounded px-2 py-1 w-fit">
                                <span class="text-[10px] font-medium text-slate-500 uppercase tracking-widest bg-slate-100/50 dark:bg-transparent px-1.5 py-0.5 rounded">CMP: ₹${stock.price.toLocaleString('en-IN')}</span>
                                <span class="text-[10px] ${stock.change >= 0 ? 'signal-up' : 'signal-down'} uppercase tracking-widest bg-slate-100/50 dark:bg-transparent px-1.5 py-0.5 rounded font-bold">(${stock.change >= 0 ? '+' : ''}${stock.change}%)</span>
                            </div>
                        </div>
                        <div class="px-2 py-0.5 text-xs font-mono bg-slate-100 dark:bg-slate-800/50 border border-slate-200/40 dark:border-slate-700/50 rounded text-slate-600 dark:text-slate-400">
                            SCORE: ${stock.score}
                        </div>
                    </div>

                    <div class="flex justify-between items-end border-t border-slate-100 dark:border-slate-800/80 pt-3 mt-3">
                        <div class="grid grid-cols-3 gap-2 flex-grow">
                            <div class="flex flex-col">
                                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">${label1}</span>
                                <span class="text-[13px] font-bold text-slate-700 dark:text-slate-300 mt-0.5">${stock.ema9}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">${label2}</span>
                                <span class="text-[13px] font-bold text-slate-700 dark:text-slate-300 mt-0.5">${stock.ema20}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">VOL:</span>
                                <span class="text-[13px] font-bold text-slate-700 dark:text-slate-300 mt-0.5">${formatVolume(rawVolume)}</span>
                            </div>
                        </div>
                        <span class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 dark:hover:text-emerald-300 hover:underline tracking-wide transition-colors duration-200 flex items-center gap-1.5 shrink-0">
                            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                            VIEW CHART
                        </span>
                    </div>
                `;
                
                signalsContainer.appendChild(card);
            });
        }

        function exportToCSV() {
            if (lastScanData.length === 0) return;

            const headers = ['Ticker', 'Price (INR)', 'Change (%)', 'Volume', '9 EMA', '20 EMA', 'Momentum Condition', 'Tightness Score'];
            const rows = lastScanData.map(stock => {
                const rawVolume = stock.Volume || stock.volume || stock.VOL || stock.vol || 0;
                return [
                    stock.ticker,
                    stock.price,
                    stock.change,
                    rawVolume,
                    stock.ema9,
                    stock.ema20,
                    stock.setup,
                    stock.score
                ];
            });

            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            
            const date = new Date().toISOString().split('T')[0];
            link.setAttribute("download", `AAPNATRADER_Scan_${date}.csv`);
            document.body.appendChild(link);

            link.click();
            document.body.removeChild(link);
        }

        scanBtn.addEventListener('click', triggerScan);
        exportBtn.addEventListener('click', exportToCSV);
        strategyScannerBtn.addEventListener('click', () => updateStrategy('current'));
        strategyMomentumOpenBtn.addEventListener('click', () => updateStrategy('momentum_open_30'));
        universeSelector.addEventListener('change', () => triggerScan());
    </script>
    <script>
        document.addEventListener('click', function(event) {
            const card = event.target.closest('.card-anim');
            if (card) {
                let tickerText = card.querySelector('h3')?.innerText || card.innerText;
                let match = tickerText.match(/[A-Z]+/);
                if (match) {
                    let ticker = match[0].trim();
                    event.preventDefault();
                    window.open('https://www.tradingview.com/chart/?symbol=NSE:' + ticker, '_blank');
                }
            }
        }, true);
    </script>
</body>
</html>
