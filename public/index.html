<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCANNER.PRO | Elite Institutional Momentum</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0B0F19',
                        surface: '#161B26',
                        accent: '#34D399', // emerald-400
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F19; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(22, 27, 38, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(100, 116, 139, 0.2); }
        .gold-glow { box-shadow: 0 0 20px rgba(52, 211, 153, 0.15); }
        .card-anim { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-anim:active { scale: 0.98; opacity: 0.8; }
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .pulse-emerald { animation: pulse-emerald 2s infinite; }
    </style>
</head>
<body class="text-slate-200 font-sans selection:bg-accent/30 selection:text-accent">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 glass z-50 px-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-accent rounded flex items-center justify-center font-extrabold text-background text-lg">S</div>
            <span class="font-extrabold text-sm tracking-tighter uppercase">Scanner<span class="text-accent">.Pro</span></span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-accent pulse-emerald"></div>
            <span class="text-[10px] font-bold text-accent uppercase tracking-widest">Live Terminal</span>
        </div>
    </header>

    <main class="pt-24 pb-32 px-4 max-w-lg mx-auto">
        <!-- Hero / Context -->
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">INSTITUTIONAL <br/><span class="text-accent italic">MOMENTUM</span></h1>
            <p class="text-slate-500 text-xs font-medium uppercase tracking-[0.2em]">VCP & High Tight Flag Detection</p>
        </div>

        <!-- Stats Bar -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="glass p-4 rounded-2xl">
                <div class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Market Pulse</div>
                <div class="text-lg font-mono font-bold">NSE:INDIA</div>
            </div>
            <div class="glass p-4 rounded-2xl">
                <div class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Scan Status</div>
                <div id="scan-status" class="text-lg font-mono font-bold text-accent">IDLE</div>
            </div>
        </div>

        <!-- Signals List -->
        <div id="signals-container" class="space-y-4">
            <!-- Empty State -->
            <div id="empty-state" class="py-20 text-center">
                <div class="w-12 h-12 border-2 border-dashed border-slate-700 rounded-full mx-auto mb-4 flex items-center justify-center">
                    <span class="text-slate-700 text-xl">+</span>
                </div>
                <p class="text-slate-500 text-sm font-medium">No active signals detected.<br/>Trigger system scan below.</p>
            </div>
        </div>
    </main>

    <!-- Sticky Action Button -->
    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background via-background/90 to-transparent z-50">
        <button id="scan-btn" class="w-full bg-accent text-background py-5 rounded-2xl font-extrabold text-lg uppercase tracking-widest gold-glow active:scale-95 transition-all flex items-center justify-center gap-3">
            <span id="btn-text">Initialize Scan</span>
            <svg id="loading-spinner" class="hidden animate-spin h-5 w-5 text-background" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
