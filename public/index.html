    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--bg-color)',
                        surface: 'var(--surface-color)',
                        accent: 'var(--accent-color)',
                        border: 'var(--border-color)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        iceland: ['Iceland', 'sans-serif'],
                    }

    <style>
        :root {
            --bg-color: #030712;
            --surface-color: #111827;
            --accent-color: #34D399;
            --border-color: #1E293B;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --glass-bg: #111827;
            --pod-bg: #111827;
        }

        body.light-theme {
            --bg-color: #f4f6f9;
            --surface-color: #ffffff;
            --accent-color: #059669;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #475569; 
            --glass-bg: rgba(255, 255, 255, 0.8);
            --pod-bg: #ffffff;
        }

        body.dark {
            --bg-color: #030712;
            --surface-color: #0b0f19;
        }

        /* Targeted Hardware-Accelerated Theme Transition */
        .theme-transition {
            transition: background-color 300ms ease, border-color 300ms ease, box-shadow 300ms ease !important;
            will-change: background-color, border-color;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-secondary);
            -webkit-tap-highlight-color: transparent; 
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.dark .card-anim {
            background-color: rgba(11, 15, 25, 0.9) !important;
            border-color: rgba(30, 41, 59, 0.9) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2) !important;
        }
        body.dark .card-anim:hover {
            border-color: rgba(51, 65, 85, 0.8) !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35) !important;
            transform: translateY(-2px);
        }

        /* Optimized Dual-Layer Background Texture */
        body::before, body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            transition: opacity 500ms cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* Dark Grid */
        body::before {
            background-image: linear-gradient(rgba(16, 185, 129, 0.12) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(16, 185, 129, 0.12) 1px, transparent 1px);
            background-size: 16px 16px;
            opacity: 1;
        }

        /* Light Texture */
        body::after {
            background-image: radial-gradient(rgba(15, 23, 42, 0.12) 1px, transparent 1px);
            background-size: 12px 12px;
            opacity: 0;
        }

        body.light-theme::before { opacity: 0; }
        body.light-theme::after { opacity: 1; }

        /* --- Content Isolation Layer --- */
        body > * {
            position: relative;
            z-index: 1;
        }

        /* --- Light Theme Force Overrides --- */
        body.light-theme .text-slate-100,
        body.light-theme .text-slate-300,
        body.light-theme .text-slate-500,
        body.light-theme .text-white,
        body.light-theme .brand-text span:first-child { color: #0f172a !important; }
        
        body.light-theme .card-anim h3,
        body.light-theme .card-anim span:not(.text-accent):not(.signal-up):not(.signal-down) { color: #0f172a !important; }

        body.light-theme .tactical-card { 
            background: #ffffff !important; 
            border: 1px solid rgba(16, 185, 129, 0.1) !important; 
            backdrop-filter: blur(16px) !important; 
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.05) !important;
        }

        body.light-theme .card-anim {
            background-color: #ffffff !important;
            border: 1px solid rgba(226, 232, 240, 0.6) !important;
            border-left: 4px solid #059669 !important;
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.05) !important;
        }

        body.light-theme #scan-btn,
        body.light-theme #export-btn {
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.3) !important;
        }

        body.light-theme .score-badge {
            background: rgba(5, 150, 105, 0.08) !important;
            border: 1px solid rgba(5, 150, 105, 0.2) !important;
            color: #059669 !important;
        }

        body.light-theme select {
            color: #1e293b !important;
            border-color: #e2e8f0 !important; 
            background-color: #ffffff !important;
        }
        
        body.light-theme select option { color: #1e293b !important; }
        
        body.light-theme #matrix-engine-display { color: #1e293b !important; }
        body.light-theme #scan-status:not(.signal-up):not(.signal-down) { color: #64748b !important; }

        body.light-theme #strategy-scanner, 
        body.light-theme #strategy-momentum-open {
            background-color: #ffffff !important;
            border-color: #e2e8f0 !important;
        }

        /* High-Contrast Signal Overrides (Theme Agnostic) */
        .signal-up { color: #34D399 !important; font-weight: 800 !important; }
        .signal-down { color: #f87171 !important; font-weight: 800 !important; }
        
        body.light-theme .signal-up { color: #059669 !important; }
        body.light-theme .signal-down { color: #dc2626 !important; }
        /* ---------------------------------- */

        /* Solid UI Overrides */
        #strategy-scanner, #strategy-momentum-open {
            background-color: var(--surface-color);
        }
        #strategy-scanner.border-accent {
            background-color: #152721; /* Solid Dark Emerald Tint */
        }
        body.light-theme #strategy-scanner.border-accent {
            background-color: #ecfdf5 !important; /* Solid Light Emerald Tint */
        }

        #universe-selector {
            background-color: var(--bg-color) !important;
        }

        /* --- Section Header Masking --- */
        .section-header-mask {
            background: #030712;
            box-shadow: 0 0 10px 10px #030712;
            border-radius: 4px;
            padding: 6px 12px;
            z-index: 10;
            position: relative;
            margin-left: -12px; /* Offset padding for alignment */
        }
        body.light-theme .section-header-mask {
            background: #f8fafc !important;
            box-shadow: 0 0 10px 10px #f8fafc !important;
        }
        .section-header-mask h2, .section-header-mask div {
            font-weight: 700 !important;
            text-rendering: optimizeLegibility;
        }
        /* ------------------------------ */

        /* --- Cyber Checkbox Styling --- */
        .cyber-checkbox {
            appearance: none;
            width: 14px;
            height: 14px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            margin-right: 4px;
            vertical-align: middle;
        }
        .cyber-checkbox:checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }
        .cyber-checkbox:checked::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-color);
            font-size: 10px;
            font-weight: 900;
        }
        /* ------------------------------ */

        .text-slate-300 { color: var(--text-primary); }
        .text-slate-100 { color: var(--text-primary); }
        .text-slate-500 { color: var(--text-secondary); }
        .text-white { color: var(--text-primary); }
        .bg-background { background-color: var(--bg-color); }
        .bg-surface { background-color: var(--surface-color); }
        .border-border { border-color: var(--border-color); }
        
        .terminal-border { border: 1px solid var(--border-color); }
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); }
        .tactical-card { background: var(--pod-bg); backdrop-filter: blur(12px); }

        /* --- Global Interaction Transition --- */
        button, .card-anim, select, .switch .slider {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        /* --- Main Action Buttons (Scan/Export) --- */
        #scan-btn, #export-btn {
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        #scan-btn:hover, #export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.25);
            letter-spacing: 4px;
        }
        body.light-theme #scan-btn:hover {
            background-color: #059669 !important; /* emerald-600 */
        }
        #scan-btn:active, #export-btn:active {
            transform: translateY(0px) scale(0.98);
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
        }

        /* --- Strategy Tabs --- */
        #strategy-scanner, #strategy-momentum-open {
            border: 1px solid var(--border-color);
        }
        #strategy-scanner:hover, #strategy-momentum-open:hover {
            border-color: var(--accent-color);
            background-color: rgba(52, 211, 153, 0.05);
        }
        body.light-theme #strategy-scanner:hover, 
        body.light-theme #strategy-momentum-open:hover {
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
            border-color: rgba(226, 232, 240, 0.8); /* slate-200/80 */
        }

        /* --- Live Signals Cards (GPU Accelerated) --- */
        #signals-container {
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        .card-anim { 
            background-color: var(--surface-color) !important;
            cursor: pointer; 
            border: 1px solid var(--border-color);
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        .card-anim:hover { 
            transform: translateY(-2px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease !important;
        }
        body.light-theme .card-anim:hover {
            border-color: rgba(203, 213, 225, 0.9) !important; /* slate-300/90 */
        }
        .card-anim:active { 
            transform: translateY(-1px) scale(0.99);
            opacity: 0.9; 
        }

        /* --- Dropdowns & Selection Inputs --- */
        select {
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        select:hover, select:focus {
            border-color: var(--accent-color) !important;
            outline: none;
            box-shadow: 0 0 0 1px var(--accent-color);
        }
        
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .pulse-emerald { animation: pulse-emerald 2s infinite; }

        @keyframes neon-breathe {
            from { text-shadow: 0 0 10px rgba(52, 211, 153, 0.4), 0 0 20px rgba(52, 211, 153, 0.2); }
            to { text-shadow: 0 0 25px rgba(52, 211, 153, 0.9), 0 0 45px rgba(52, 211, 153, 0.5); }
        }
        .brand-glow { animation: neon-breathe 3s ease-in-out infinite alternate; }

        @keyframes border-pulse {
            0%, 100% { border-color: rgba(52, 211, 153, 0.1); box-shadow: 0 0 15px rgba(52, 211, 153, 0.05); }
            50% { border-color: rgba(52, 211, 153, 0.3); box-shadow: 0 0 30px rgba(52, 211, 153, 0.1); }
        }
        .tactical-card { border-width: 0.5px; animation: border-pulse 5s infinite ease-in-out; }
        
        .brand-text {
            font-family: "Iceland", sans-serif;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: inline-block;
        }

        .theme-toggle {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Custom Theme Switch - High-Tech Refactor */
        .switch {
            position: relative;
            display: flex;
            align-items: center;
            width: 48px;
            height: 24px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #0b0f19;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 2px;
            background-color: #10b981;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        input:checked + .slider {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.08);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: #059669;
            box-shadow: 0 0 10px rgba(5, 150, 105, 0.6);
        }

        /* Custom Y-Axis Tooltip Styling for Contrast (Global) */
        .apexcharts-yaxistooltip {
            background: #090d16 !important;
            border: 1.5px solid #3b82f6 !important; /* Premium dark blue border for distinction */
            color: #3b82f6 !important; /* Blue text */
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 9px !important;
            font-weight: bold !important;
            border-radius: 4px !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7) !important;
        }
        body.light-theme .apexcharts-yaxistooltip {
            background: #ffffff !important;
            border: 1.5px solid #2563eb !important;
            color: #2563eb !important;
        }
        /* Arrow border styling to match */
        .apexcharts-yaxistooltip-right::before {
            border-left-color: #3b82f6 !important;
            border-right-color: #3b82f6 !important;
        }
        .apexcharts-yaxistooltip-right::after {
            border-left-color: #090d16 !important;
            border-right-color: #090d16 !important;
        }
        body.light-theme .apexcharts-yaxistooltip-right::before {
            border-left-color: #2563eb !important;
            border-right-color: #2563eb !important;
        }
        body.light-theme .apexcharts-yaxistooltip-right::after {
            border-left-color: #ffffff !important;
            border-right-color: #ffffff !important;
        }

        /* High-fidelity Y-axis dragging cursor selector */
        .apexcharts-yaxis, .apexcharts-yaxis-texts-g text, .apexcharts-yaxis-label {
            cursor: ns-resize !important;
            pointer-events: all !important;
        }

        /* Suppress crosshair and tooltips during Y-axis drag to clear GPU rendering threads */
        .dragging-y .apexcharts-tooltip,
        .dragging-y .apexcharts-x-crosshairs,
        .dragging-y .apexcharts-y-crosshairs,
        .dragging-y .apexcharts-yaxistooltip,
        .dragging-y .apexcharts-xcrosshairs,
        .dragging-y .apexcharts-ycrosshairs {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* --- Mobile Responsive Logic (< 768px) --- */
        @media (max-width: 767px) {
            header .max-w-6xl {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
                padding: 12px 16px;
                height: auto;
            }
            
            header {
                height: auto;
                min-height: 4rem;
            }

            .brand-text {
                font-size: 1.25rem;
            }

            .flex.items-center.gap-\[16px\] {
                gap: 8px;
            }

            .switch {
                width: 40px;
                height: 20px;
            }
            .slider:before {
                height: 14px;
                width: 14px;
                left: 3px;
                bottom: 2px;
            }
            input:checked + .slider:before {
                transform: translateX(20px);
            }

            .max-w-6xl.mx-auto.px-4.pt-16 {
                pt-24;
            }

            /* Hero Scaling */
            .mb-12.p-8.rounded-3xl {
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }
            
            h1.brand-text {
                font-size: 1.8rem !important;
                letter-spacing: 2px !important;
            }

            /* Action Tabs Flex */
            .mb-6.grid.grid-cols-2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            
            #strategy-scanner, #strategy-momentum-open {
                padding-top: 1rem;
                padding-bottom: 1rem;
                font-size: 8px;
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>

        const scanBtn = document.getElementById('scan-btn');
        const exportBtn = document.getElementById('export-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const signalsContainer = document.getElementById('signals-container');
        const scanStatus = document.getElementById('scan-status');
        const emptyState = document.getElementById('empty-state');
        const resultsMeta = document.getElementById('results-meta');
        const signalCountSpan = document.getElementById('signal-count');
        const resultCountBadge = document.getElementById('result-count-badge');
        const sortSelector = document.getElementById('sort-selector');
        
        // Theme Toggle Refs
        const themeToggle = document.getElementById('theme-toggle');
        
        // Strategy Switcher & Universe Refs
        const strategyScannerBtn = document.getElementById('strategy-scanner');
        const strategyMomentumOpenBtn = document.getElementById('strategy-momentum-open');
        const universeSelector = document.getElementById('universe-selector');
        const matrixEngineDisplay = document.getElementById('matrix-engine-display');
        const tickerSearch = document.getElementById('ticker-search');

        // Advanced Filters Accordion Refs
        const toggleAdvancedBtn = document.getElementById('toggle_advanced_btn');
        const toggleAdvancedText = document.getElementById('toggle_advanced_text');
        const advancedFiltersPanel = document.getElementById('advanced_filters_panel');

        let isAdvancedOpen = false;

        toggleAdvancedBtn.addEventListener('click', () => {
            isAdvancedOpen = !isAdvancedOpen;
            if (isAdvancedOpen) {
                advancedFiltersPanel.classList.remove('max-h-0', 'opacity-0');
                advancedFiltersPanel.classList.add('max-h-[1000px]', 'opacity-100');
                toggleAdvancedText.innerHTML = '⚙️ COLLAPSE ADVANCED MATRIX CONTROLS <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-12 h-[2px] bg-accent rounded-full shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>';
                toggleAdvancedText.classList.add('text-accent');
                toggleAdvancedBtn.classList.add('border-accent/50');
                
                // Ensure a clean slate when expanding (all filters off by default)
                document.getElementById('use_ema_filter').checked = false;
                document.getElementById('use_vol_filter').checked = false;
                document.getElementById('use_consolidation').checked = false;
                document.getElementById('use_swing_run').checked = false;
                document.getElementById('use_base_pullback').checked = false;
            } else {
                advancedFiltersPanel.classList.remove('max-h-[1000px]', 'opacity-100');
                advancedFiltersPanel.classList.add('max-h-0', 'opacity-0');
                toggleAdvancedText.innerHTML = '⚙️ EXPAND ADVANCED MATRIX CONTROLS';
                toggleAdvancedText.classList.remove('text-accent');
                toggleAdvancedBtn.classList.remove('border-accent/50');
                
                // Enforce pure base strategy fallback when collapsed
                document.getElementById('use_ema_filter').checked = false;
                document.getElementById('use_vol_filter').checked = false;
                document.getElementById('use_consolidation').checked = false;
                document.getElementById('use_swing_run').checked = false;
                document.getElementById('use_base_pullback').checked = false;
            }
        });

        let lastScanData = [];
        let activeStrategy = 'current';
        let activeViewMode = 'list';
        let activeCharts = {};

        // Debounce modifier to throttle high-frequency events and preserve main thread
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        const lazyLoadObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const ticker = entry.target.getAttribute('data-ticker');
                    if (ticker) {
                        window.loadInteractiveChart(ticker);
                        lazyLoadObserver.unobserve(entry.target);
                    }
                }
            });
        }, {
            rootMargin: '100px 0px' // Start loading slightly before rolling into viewport
        });

        async function triggerScan() {
            // UI Visual Update for Matrix Engine
            matrixEngineDisplay.textContent = universeSelector.options[universeSelector.selectedIndex].text.split('(')[0].trim();

            scanBtn.disabled = true;
            resultsMeta.classList.add('hidden');
            resultCountBadge.classList.add('hidden');
            let strategyLabel = activeStrategy.toUpperCase();
            if (activeStrategy === 'momentum_open_30') {
                strategyLabel = 'MOMENTUM VORTEX';
            }
            btnText.textContent = `Analyzing ${strategyLabel} Universe...`;
            loadingSpinner.classList.remove('hidden');
            
            scanStatus.textContent = 'Active';
            scanStatus.classList.remove('text-slate-500', 'signal-down');
            scanStatus.classList.add('signal-up', 'animate-pulse');

            try {
                const universe = universeSelector.value;
                // --- Dynamic UI Parameter Tweaker Hook ---
                const emaFastVal = parseInt(document.getElementById('ema_fast').value, 10);
                const emaSlowVal = parseInt(document.getElementById('ema_slow').value, 10);
                const minVolVal = parseInt(document.getElementById('min_volume').value, 10);
                const consolDays = parseInt(document.getElementById('consolidation_days').value, 10);
                const consolRange = parseFloat(document.getElementById('consolidation_range').value);
                const swingRun = parseFloat(document.getElementById('swing_run_pct').value);
                const basePct = parseFloat(document.getElementById('base_pullback_pct').value);
                
                const useEma = document.getElementById('use_ema_filter').checked ? 1 : 0;
                const useVol = document.getElementById('use_vol_filter').checked ? 1 : 0;
                const useConsol = document.getElementById('use_consolidation').checked ? 1 : 0;
                const useSwing = document.getElementById('use_swing_run').checked ? 1 : 0;
                const useBase = document.getElementById('use_base_pullback').checked ? 1 : 0;

                const response = await fetch(`/api/scan?strategy=${activeStrategy}&universe=${universe}&ema_fast=${emaFastVal}&ema_slow=${emaSlowVal}&min_volume=${minVolVal}&consolidation_days=${consolDays}&consolidation_range=${consolRange}&swing_run_pct=${swingRun}&base_pullback_pct=${basePct}&use_ema_filter=${useEma}&use_vol_filter=${useVol}&use_consolidation=${useConsol}&use_swing_run=${useSwing}&use_base_pullback=${useBase}`);
                const result = await response.json();

                if (result.status === 'success') {
                    lastScanData = result.data;
                    renderSignals(result.data);
                    scanStatus.textContent = 'Done';
                    if (result.data.length > 0) {
                        resultsMeta.classList.remove('hidden');
                        signalCountSpan.textContent = result.data.length;
                        resultCountBadge.classList.remove('hidden');
                    }
                } else {
                    throw new Error('Scan failed');
                }
            } catch (error) {
                console.error('Scan Error:', error);
                scanStatus.textContent = 'Error';
                scanStatus.classList.replace('signal-up', 'signal-down');
            } finally {
                scanBtn.disabled = false;
                btnText.textContent = 'Re-Execute System Scan';
                loadingSpinner.classList.add('hidden');
                scanStatus.classList.remove('animate-pulse');
            }

        function generateSparklineSVG(history, change) {
            if (!history || history.length < 2) return '';
            
            // Extract raw values from the history array of objects
            const values = history.map(h => h.value);
            
            const width = 120;
            const height = 30;
            const padding = 2;
            
            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = max - min === 0 ? 1 : max - min;
            
            const points = values.map((price, idx) => {
                const x = padding + (idx / (values.length - 1)) * (width - 2 * padding);
                const y = padding + (1 - (price - min) / range) * (height - 2 * padding);
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            });
            
            const isPositive = change >= 0;
            const strokeColor = isPositive ? '#10B981' : '#f87171';
            const gradientId = `sparkline-grad-${Math.random().toString(36).substr(2, 9)}`;
            const fillPoints = [
                `${padding.toFixed(1)},${height.toFixed(1)}`,
                ...points,
                `${(width - padding).toFixed(1)},${height.toFixed(1)}`
            ].join(' ');

            return `
                <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="overflow-visible select-none pointer-events-none">
                    <defs>
                        <linearGradient id="${gradientId}" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="${strokeColor}" stop-opacity="0.25"></stop>
                            <stop offset="100%" stop-color="${strokeColor}" stop-opacity="0.00"></stop>
                        </linearGradient>
                    </defs>
                    <polygon points="${fillPoints}" fill="url(#${gradientId})"></polygon>
                    <polyline fill="none" stroke="${strokeColor}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" points="${points.join(' ')}"></polyline>
                </svg>
            `;
        }

            // Bind mouse drag listeners to the Price Y-axis scale (TradingView-style vertical scaling)
            let isDraggingY = false;
            let startY = 0;
            let initialMin = 0;
            let initialMax = 0;
            let lastCalculatedMin = null;
            let lastCalculatedMax = null;
            let animationFrameId = null;

            // Variables for chart area custom panning (XY)
            let isDraggingChart = false;
            let startChartX = 0;
            let startChartY = 0;
            let initialChartMinY = 0;
            let initialChartMaxY = 0;
            let initialChartMinX = 0;
            let initialChartMaxX = 0;

            function onMouseMoveY(e) {
                if (!isDraggingY) return;
                
                const deltaY = e.clientY - startY;
                const containerHeight = container.clientHeight || 300;
                
                // Sensitivity: moving cursor vertical distance changes range factor logarithmically
                const sensitivity = 1.5;
                const rangeMultiplier = Math.pow(3, (deltaY / containerHeight) * sensitivity);
                
                const initialRange = initialMax - initialMin;
                const midPrice = (initialMax + initialMin) / 2;
                
                const newRange = initialRange * rangeMultiplier;
                const newMin = midPrice - (newRange / 2);
                const newMax = midPrice + (newRange / 2);
                
                lastCalculatedMin = newMin;
                lastCalculatedMax = newMax;
                
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(() => {
                    chart.updateOptions({
                        yaxis: [

                            },

                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;

                window.removeEventListener('mousemove', onMouseMoveY);

                chart.updateOptions({
                    tooltip: { enabled: true },
                    xaxis: { crosshairs: { show: true, enabled: true } },
                    yaxis: [
                        yaxisPriceConfig,
                        {
                            seriesName: 'Volume',
                            show: false,
                            min: 0,
                            max: function(max) { return max * 3.0; }
                        }
                    ]
                }, false, false, false);
            }

            function onMouseMoveChart(e) {
                if (!isDraggingChart) return;
                
                const deltaX = e.clientX - startChartX;
                const deltaY = e.clientY - startChartY;
                const containerWidth = container.clientWidth || 600;
                const containerHeight = container.clientHeight || 300;
                
                // 1. Calculate X-axis panning shift
                const xRange = initialChartMaxX - initialChartMinX;
                const xDelta = (deltaX / containerWidth) * xRange;
                const newMinX = Math.max(0, initialChartMinX - xDelta);
                const newMaxX = initialChartMaxX - xDelta;
                
                // 2. Calculate Y-axis panning shift (vertical scrolling/panning)
                const priceRange = initialChartMaxY - initialChartMinY;
                const priceDelta = (deltaY / containerHeight) * priceRange;
                const newMinY = initialChartMinY + priceDelta;
                const newMaxY = initialChartMaxY + priceDelta;
                
                lastCalculatedMin = newMinY;
                lastCalculatedMax = newMaxY;
                
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(() => {
                    chart.updateOptions({
                        xaxis: {
                            min: newMinX,
                            max: newMaxX
                        },
                        yaxis: [
                            {
                                seriesName: 'Price',
                                opposite: true,
                                forceNiceScale: false,
                                min: newMinY,
                                max: newMaxY
                            },
                            {
                                seriesName: 'Volume',
                                show: false
                            }
                        ]
                    }, false, false, false);
                });
            }

            function onMouseUpChart(e) {
                isDraggingChart = false;
                container.classList.remove('dragging-y');
                
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                
                window.removeEventListener('mousemove', onMouseMoveChart);
                window.removeEventListener('mouseup', onMouseUpChart);

                // Restore tooltips and crosshairs instantly on mouseup while preserving the final dragged price scale limits
                const yaxisPriceConfig = {
                    seriesName: 'Price',
                    opposite: true,
                    forceNiceScale: false,
                    crosshairs: { show: true, enabled: true, tooltip: { enabled: true } },
                    tooltip: { enabled: true }
                };

                if (lastCalculatedMin !== null && lastCalculatedMax !== null) {
                    yaxisPriceConfig.min = lastCalculatedMin;
                    yaxisPriceConfig.max = lastCalculatedMax;
                }

                chart.updateOptions({
                    tooltip: { enabled: true },
                    xaxis: { crosshairs: { show: true, enabled: true } },
                    yaxis: [
                        yaxisPriceConfig,
                        {
                            seriesName: 'Volume',
                            show: false,
                            min: 0,
                            max: function(max) { return max * 3.0; }
                        }
                    ]
                }, false, false, false);

                const rect = container.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                
                // Active scale drag zone triggers on the rightmost 85px of the chart wrapper
                if (clickX > (rect.width - 85)) {
                    e.preventDefault();
                    e.stopPropagation();
                    isDraggingY = true;
                    startY = e.clientY;
                    
                    lastCalculatedMin = null;
                    lastCalculatedMax = null;
                    
                    const priceYaxis = chart.w.globals.yAxisScale && chart.w.globals.yAxisScale[0];

        window.zoomInteractiveChart = function(ticker, direction) {
            const chart = activeCharts[ticker];
            if (!chart) return;

            let currentMin = chart.w.globals.minX;
            let currentMax = chart.w.globals.maxX;
            const totalDataPoints = chart.w.globals.dataPoints;

            // Fallbacks for initial bounds before user interaction
            if (currentMin === undefined || currentMin === null) {
                currentMin = Math.max(0, totalDataPoints - 40);
            }
            if (currentMax === undefined || currentMax === null) {
                currentMax = totalDataPoints;
            }

            const currentRange = currentMax - currentMin;
            let newRange;

            if (direction === 'in') {
                newRange = Math.max(10, Math.round(currentRange * 0.7)); // Zoom in (narrow range by 30%)
            } else {
                newRange = Math.min(totalDataPoints, Math.round(currentRange * 1.4)); // Zoom out (expand range by 40%)
            }

            // Pivot zoom around current Max boundary to keep price action in perspective
            const newMin = Math.max(0, currentMax - newRange);
            const newMax = currentMax;

            chart.zoomX(newMin, newMax);
        };

        function exportToCSV() {
            if (lastScanData.length === 0) return;

            const headers = ['Ticker', 'Price (INR)', 'Change (%)', 'Volume', '9 EMA', '20 EMA', 'Momentum Condition', 'Vol Multiple'];
            const rows = lastScanData.map(stock => {

                    stock.price,
                    stock.change,
                    rawVolume,
                    stock.ema9,

            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            
            const date = new Date().toISOString().split('T')[0];
            link.setAttribute("download", `AAPNATRADER_Scan_${date}.csv`);
            document.body.appendChild(link);

            link.click();
            document.body.removeChild(link);
        }

        scanBtn.addEventListener('click', triggerScan);
        exportBtn.addEventListener('click', exportToCSV);
        strategyScannerBtn.addEventListener('click', () => updateStrategy('current'));
        strategyMomentumOpenBtn.addEventListener('click', () => updateStrategy('momentum_open_30'));
        universeSelector.addEventListener('change', () => triggerScan());

        // Debounced Window Resize event listener to handle viewport changes smoothly
        window.addEventListener('resize', debounce(() => {
            // Viewport adjustments like adjusting active charts spacing/redraw
            Object.keys(activeCharts).forEach(ticker => {
                const chart = activeCharts[ticker];
                if (chart && typeof chart.updateOptions === 'function') {
                    // Update options to force layout redraw cleanly without blocking main thread
                    chart.updateOptions({}, false, false, false);
                }
            });
        }, 150));
    </script>
    <!-- Global card click tab-opening intercepted handler removed in favor of inline show/hide buttons and grid views -->
</body>
</html>
