<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAPNATRADER | Terminal Deck</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <!-- TradingView Core Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#060810',
                        surface: '#0D111C',
                        accent: '#34D399', // emerald-400
                        border: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060810; -webkit-tap-highlight-color: transparent; }
        .terminal-border { border: 1px solid #1E293B; }
        .glass { background: rgba(13, 17, 28, 0.8); backdrop-filter: blur(8px); }
        .card-anim { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card-anim:hover { border-color: rgba(52, 211, 153, 0.4); background-color: rgba(13, 17, 28, 1); }
        .card-anim:active { scale: 0.98; opacity: 0.9; }
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .pulse-emerald { animation: pulse-emerald 2s infinite; }

        @keyframes neon-breathe {
            from { text-shadow: 0 0 4px rgba(52, 211, 153, 0.2); }
            to { text-shadow: 0 0 16px rgba(52, 211, 153, 0.6); }
        }
        .brand-glow { animation: neon-breathe 4s ease-in-out infinite alternate; }
        
        /* Modal Transition */
        #chart-modal.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="text-slate-300 font-mono selection:bg-accent/30 selection:text-accent">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-background border-b border-border z-50 flex items-center">
        <div class="max-w-6xl mx-auto w-full flex items-center justify-between px-4">
            <div class="flex items-center gap-2">
                <span class="text-lg md:text-xl uppercase">
                    <span class="text-slate-100 font-bold font-mono tracking-wide">AAPNA</span><span class="text-emerald-400 font-bold font-mono tracking-wide">TRADER</span>
                </span>
            </div>
            <div class="flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-lg border border-border">
                <div class="w-2 h-2 rounded-full bg-accent pulse-emerald"></div>
                <span class="text-xs md:text-sm font-mono font-bold text-slate-300 uppercase tracking-wider">Sentinel Monitor</span>
            </div>
        </div>
    </header>

    <!-- Main structural layout container -->
    <div class="max-w-6xl mx-auto px-4 pt-16 pb-32 md:py-24">
        
        <!-- Hero Section -->
        <div class="mb-8 md:mb-12">
            <h1 class="text-4xl md:text-6xl font-black italic tracking-widest leading-none mb-2 uppercase">
                <span class="text-slate-100">AAPNA</span><span class="text-emerald-400 brand-glow">TRADER</span>
            </h1>
            <p class="text-[9px] md:text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Momentum Logic Deck</p>
        </div>

        <!-- Responsive Flex/Grid Split -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            
            <!-- Column A (Control Section - Left Side on Desktop) -->
            <div class="md:col-span-5 space-y-6">
                
                <!-- Metric Grid -->
                <div class="grid grid-cols-2 gap-px bg-border terminal-border rounded overflow-hidden">
                    <div class="bg-background p-4">
                        <div class="text-slate-500 text-[8px] font-bold uppercase tracking-widest mb-1">Matrix Engine</div>
                        <div class="text-[11px] font-bold text-white uppercase">Nifty 500</div>
                    </div>
                    <div class="bg-background p-4">
                        <div class="text-slate-500 text-[8px] font-bold uppercase tracking-widest mb-1">System Status</div>
                        <div id="scan-status" class="text-[11px] font-bold text-slate-500 uppercase">Idle</div>
                    </div>
                </div>

                <!-- Command Station (Action Control Panel) -->
                <div class="space-y-3">
                    <button id="scan-btn" class="w-full bg-accent text-background py-5 rounded font-black text-xs uppercase tracking-[0.2em] active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span id="btn-text">Execute Scan</span>
                        <svg id="loading-spinner" class="hidden animate-spin h-4 w-4 text-background" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>

                    <div id="results-meta" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
                        <button id="export-btn" class="w-full border border-border bg-surface/50 hover:bg-surface text-slate-400 font-bold text-[10px] tracking-widest uppercase rounded py-4 transition-all flex items-center justify-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download Data Sheet (.CSV)
                        </button>
                    </div>
                </div>

            </div>

            <!-- Column B (Results Deck - Right Side on Desktop) -->
            <div class="md:col-span-7">
                
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-border/50">
                    <h2 class="text-xs font-bold uppercase tracking-[0.3em] text-slate-500">Live Signals</h2>
                    <div id="result-count-badge" class="hidden text-[10px] font-bold text-accent uppercase tracking-widest">
                        Signals: <span id="signal-count">0</span>
                    </div>
                </div>

                <div id="signals-container" class="space-y-3 min-h-[300px]">
                    <!-- Low-Profile Idle State -->
                    <div id="empty-state" class="py-20 flex flex-col items-center justify-center gap-4 terminal-border border-dashed rounded-[2rem]">
                        <div class="w-2 h-2 bg-accent rounded-full pulse-emerald"></div>
                        <div class="text-[10px] font-bold text-slate-600 tracking-[0.2em] uppercase text-center px-4 leading-relaxed">
                            [ System Status // Ready for Dispatch ]<br/>
                            <span class="text-[8px] mt-2 opacity-50 block">Awaiting Data Stream from Matrix Engine</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Chart Modal Structure -->
    <div id="chart-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="max-w-4xl w-[94%] h-[80vh] bg-[#060810] border border-slate-800 rounded-xl p-4 relative flex flex-col shadow-2xl">
            <div id="modal-close" class="text-slate-500 hover:text-slate-200 font-mono text-lg absolute top-4 right-5 cursor-pointer z-10">×</div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Viewing Matrix:</span>
                <h3 id="modal-ticker-title" class="text-lg font-black uppercase tracking-tighter">
                    <!-- Dynamic Ticker Title -->
                </h3>
            </div>
            <div id="tradingview-widget-container" class="w-full flex-grow mt-4 rounded-lg overflow-hidden h-[60vh] bg-[#060810]">
                <div class="tradingview-widget-container__widget" style="width: 100%; height: 100%;"></div>
            </div>
        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('scan-btn');
        const exportBtn = document.getElementById('export-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const signalsContainer = document.getElementById('signals-container');
        const scanStatus = document.getElementById('scan-status');
        const emptyState = document.getElementById('empty-state');
        const resultsMeta = document.getElementById('results-meta');
        const signalCountSpan = document.getElementById('signal-count');
        const resultCountBadge = document.getElementById('result-count-badge');
        
        // Modal elements
        const chartModal = document.getElementById('chart-modal');
        const modalClose = document.getElementById('modal-close');
        const modalTickerTitle = document.getElementById('modal-ticker-title');
        const widgetContainer = document.getElementById('tradingview-widget-container');

        let lastScanData = [];

        async function triggerScan() {
            scanBtn.disabled = true;
            resultsMeta.classList.add('hidden');
            resultCountBadge.classList.add('hidden');
            btnText.textContent = 'Analyzing Nifty 500...';
            loadingSpinner.classList.remove('hidden');
            
            scanStatus.textContent = 'Active';
            scanStatus.classList.replace('text-slate-500', 'text-accent');
            scanStatus.classList.add('animate-pulse');

            try {
                const response = await fetch('/api/scan');
                const result = await response.json();

                if (result.status === 'success') {
                    lastScanData = result.data;
                    renderSignals(result.data);
                    scanStatus.textContent = 'Done';
                    if (result.data.length > 0) {
                        resultsMeta.classList.remove('hidden');
                        signalCountSpan.textContent = result.data.length;
                        resultCountBadge.classList.remove('hidden');
                    }
                } else {
                    throw new Error('Scan failed');
                }
            } catch (error) {
                console.error('Scan Error:', error);
                scanStatus.textContent = 'Error';
                scanStatus.classList.replace('text-accent', 'text-red-500');
            } finally {
                scanBtn.disabled = false;
                btnText.textContent = 'Re-Execute System Scan';
                loadingSpinner.classList.add('hidden');
                scanStatus.classList.remove('animate-pulse');
            }
        }

        function renderSignals(stocks) {
            if (stocks.length === 0) {
                emptyState.classList.remove('hidden');
                signalsContainer.innerHTML = '';
                signalsContainer.appendChild(emptyState);
                return;
            }

            emptyState.classList.add('hidden');
            signalsContainer.innerHTML = '';

            stocks.forEach((stock, index) => {
                const card = document.createElement('div');
                card.className = 'bg-surface border border-border p-5 rounded-lg card-anim relative overflow-hidden group hover:border-accent/30';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-xl tracking-tight text-white leading-none uppercase">${stock.ticker}</h3>
                            <div class="flex items-center gap-2 mt-1.5">
                                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Entry: ₹${stock.price.toLocaleString('en-IN')}</span>
                            </div>
                        </div>
                        <div class="bg-emerald-950 px-3 py-1 rounded border border-accent/20">
                            <span class="text-[10px] font-black text-accent uppercase tracking-tighter">Score: ${stock.score}</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center text-[9px] font-bold uppercase tracking-widest text-slate-500">
                        <div class="flex gap-4">
                            <span>9 EMA: <span class="text-slate-300">${stock.ema9}</span></span>
                            <span>20 EMA: <span class="text-slate-300">${stock.ema20}</span></span>
                        </div>
                        <span class="text-accent flex items-center gap-1.5">
                            <span class="w-1 h-1 bg-accent rounded-full animate-pulse"></span>
                            View Chart
                        </span>
                    </div>
                `;
                
                // Open Chart on Click handled by Global Interceptor
                signalsContainer.appendChild(card);
            });
        }

        function closeChart() {
            chartModal.classList.remove('opacity-100', 'pointer-events-auto');
            chartModal.classList.add('opacity-0', 'pointer-events-none');
            // Flush widget to stop background threads
            setTimeout(() => {
                widgetContainer.innerHTML = '<div class="tradingview-widget-container__widget" style="width: 100%; height: 100%;"></div>';
            }, 200);
        }

        function exportToCSV() {
            if (lastScanData.length === 0) return;

            const headers = ['Ticker', 'Price (INR)', '9 EMA', '20 EMA', 'Momentum Condition', 'Tightness Score'];
            const rows = lastScanData.map(stock => [
                stock.ticker,
                stock.price,
                stock.ema9,
                stock.ema20,
                stock.setup,
                stock.score
            ]);

            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            
            const date = new Date().toISOString().split('T')[0];
            link.setAttribute("download", `AAPNATRADER_Scan_${date}.csv`);
            document.body.appendChild(link);

            link.click();
            document.body.removeChild(link);
        }

        scanBtn.addEventListener('click', triggerScan);
        exportBtn.addEventListener('click', exportToCSV);
        modalClose.addEventListener('click', closeChart);
        chartModal.addEventListener('click', (e) => {
            if (e.target === chartModal) closeChart();
        });
    </script>
    <script>
    document.addEventListener('click', function(event) {
        const card = event.target.closest('[id*="card-"]') || event.target.closest('.stock-card') || event.target.closest('[onclick]');
        if (card) {
            let tickerText = card.querySelector('h3, .ticker, bold, span')?.innerText || card.innerText;
            let match = tickerText.match(/[A-Z]+/);
            if (match) {
                let ticker = match[0].trim();
                event.stopImmediatePropagation();
                event.preventDefault();

                const modal = document.getElementById("chart-modal");
                if (modal) {
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                    modal.classList.add('opacity-100', 'pointer-events-auto');
                }
                
                const titleDisplay = document.getElementById("modal-ticker-title");
                if (titleDisplay) {
                    titleDisplay.innerHTML = `VIEWING MATRIX: <span class="text-emerald-400">NSE:${ticker}</span>`;
                }
                
                const container = document.getElementById("tradingview-widget-container");
                if (container) {
                    container.innerHTML = '';
                    const iframe = document.createElement('iframe');
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.style.border = 'none';
                    iframe.src = 'https://charts.whotrades.com/embedded?symbol=' + ticker + '&period=D&theme=dark&hide_side_panel=true';
                    container.appendChild(iframe);
                }
            }
        }
    }, true);
    </script>
</body>
</html>
